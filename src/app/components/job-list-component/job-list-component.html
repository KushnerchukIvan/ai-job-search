<main class="main">
    @if (jobs.length > 0) {
  <section class="job-list">
    <h2>Знайдені вакансії</h2>

    @for (job of jobs; track job.url) {
      <div class="job-card">
        <h3>{{ job.title }}</h3>
        <p class="company">{{ job.company }}</p>
        <p class="description">{{ job.description }}</p>
        <a [href]="job.url" target="_blank">Переглянути вакансії →</a>
      </div>
    }

  </section>
}
</main>
